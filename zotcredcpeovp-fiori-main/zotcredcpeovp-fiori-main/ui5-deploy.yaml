# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: lumen.zotcredcpeovp
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: BAS_S4D_200
          url: http://ns2wd1app1.saperp.corp.intranet:44300/
          client: '200'
        app:
          name: ZREDCPEOVP
          description: Red CPE Sales Order Dashboard
          package: ZOTC
          transport: S4DK945431
        exclude:
          - /test/
