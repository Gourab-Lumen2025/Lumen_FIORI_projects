# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: lumen.zcreateretneccoracleorder
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: BAS_S1D_200
          url: http://ns2wd1app1.saperp.corp.intranet:44301/
          client: '200'
        app:
          name: ZCRETNORDER_ECC
          description: Create Return Order wrt ECC/Oracle Order
          package: ZOTC
          transport: S1DK920842
        exclude:
          - /test/
