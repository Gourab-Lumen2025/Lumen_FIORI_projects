# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: zmyprreqext
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
customConfiguration:
  adp:
    support:
      id: '@sap/generator-adaptation-project'
      version: NO_VERSION_FOUND
      toolsId: 76ca992d-a44e-4057-bd68-66ea6e922494
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: BAS_S1D_200
          url: http://ns2wd1app1.saperp.corp.intranet:44301/
          client: '200'
        app:
          package: ZPTP
          transport: S1DK920210
        exclude:
          - /test/
        lrep: apps/ui.s2p.mm.sspreq.creates1/appVariants/customer.zmyprreqext/
